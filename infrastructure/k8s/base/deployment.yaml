apiVersion: apps/v1
kind: Deployment
metadata:
  name: mahmoud-platform-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: octane
        image: mahmoud-platform/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: backend-env-secrets
